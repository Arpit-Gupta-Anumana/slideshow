<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slideshow</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  #viewer {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #viewer img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: opacity 0.4s ease;
  }

  #viewer img.loading { opacity: 0; }

  #counter {
    position: absolute;
    top: 14px;
    right: 18px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    color: #888;
    background: rgba(0,0,0,0.5);
    padding: 4px 10px;
    border-radius: 6px;
  }

  #status {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 24px;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 12px 28px;
    border-radius: 10px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 10;
  }
  #status.show { opacity: 1; }

  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: none;
    color: #ccc;
    font-size: 28px;
    width: 48px;
    height: 72px;
    border-radius: 8px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 2;
  }
  #viewer:hover .nav-btn { opacity: 1; }
  .nav-btn:hover { background: rgba(255,255,255,0.15); }
  #prev-btn { left: 12px; }
  #next-btn { right: 12px; }

  #empty-state {
    text-align: center;
    color: #555;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    line-height: 2;
  }
  #empty-state span { font-size: 48px; display: block; margin-bottom: 8px; }
</style>
</head>
<body>

<div id="viewer">
  <div id="empty-state">
    <span>🖼</span>
    Loading images from server...
  </div>
  <img id="slide" style="display:none" />
  <div id="counter"></div>
  <div id="status"></div>
  <button class="nav-btn" id="prev-btn">‹</button>
  <button class="nav-btn" id="next-btn">›</button>
</div>

<script>
const IMAGE_DIR = '/images/';
const IMG_EXT = new Set(['jpg','jpeg','png','gif','webp','bmp','svg','avif','tiff']);

let images = [];
let current = 0;
let playing = true;
let interval = 3;
let timer = null;

const slideEl   = document.getElementById('slide');
const counterEl = document.getElementById('counter');
const statusEl  = document.getElementById('status');
const emptyState = document.getElementById('empty-state');

function flashStatus(msg) {
  statusEl.textContent = msg;
  statusEl.classList.add('show');
  clearTimeout(statusEl._t);
  statusEl._t = setTimeout(() => statusEl.classList.remove('show'), 800);
}

async function fetchImageList() {
  try {
    const res = await fetch(IMAGE_DIR);
    const listing = await res.json();
    return listing
      .filter(f => f.type === 'file' && IMG_EXT.has(f.name.split('.').pop().toLowerCase()))
      .map(f => f.name)
      .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
  } catch (e) {
    console.error('Failed to fetch image list:', e);
    emptyState.innerHTML = '<span>⚠️</span>Could not reach the image server.<br>Make sure nginx is running.';
    return [];
  }
}

function fireAdbTrigger(filename) {
  fetch('/api/trigger', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: filename })
  }).catch(() => {});
}

function applySlide(index) {
  if (images.length === 0) return;
  current = Math.max(0, Math.min(images.length - 1, index));
  const img = slideEl;
  img.classList.add('loading');
  img.onload = () => img.classList.remove('loading');
  img.src = IMAGE_DIR + encodeURIComponent(images[current]);
  img.style.display = 'block';
  emptyState.style.display = 'none';
  counterEl.textContent = `${current + 1} / ${images.length}`;
  fireAdbTrigger(images[current]);
}

function advanceOrFinish() {
  if (images.length === 0) return;
  if (current >= images.length - 1) {
    stopTimer();
    playing = false;
    flashStatus('✓ Slideshow complete');
    return;
  }
  applySlide(current + 1);
}

function next() {
  if (current < images.length - 1) applySlide(current + 1);
}

function prev() {
  if (current > 0) applySlide(current - 1);
}

function startTimer() {
  stopTimer();
  if (playing && images.length > 0) {
    timer = setInterval(advanceOrFinish, interval * 1000);
  }
}

function stopTimer() {
  if (timer) { clearInterval(timer); timer = null; }
}

function pause() {
  if (!playing) return;
  playing = false;
  stopTimer();
  flashStatus('⏸ Paused');
}

function resume() {
  if (playing) return;
  playing = true;
  startTimer();
  flashStatus('▶ Playing');
}

document.getElementById('prev-btn').addEventListener('click', () => { prev(); startTimer(); });
document.getElementById('next-btn').addEventListener('click', () => { next(); startTimer(); });

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); startTimer(); }
  if (e.key === 'ArrowLeft') { prev(); startTimer(); }
  if (e.key === 'p' || e.key === 'P') pause();
  if (e.key === 'r' || e.key === 'R') resume();
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

document.getElementById('viewer').addEventListener('dblclick', toggleFullscreen);

(async () => {
  images = await fetchImageList();
  if (images.length > 0) {
    applySlide(0);
    startTimer();
  } else {
    emptyState.innerHTML = '<span>🖼</span>No images found.<br>Put image files in the <b>images/</b> folder and restart nginx.';
  }
})();
</script>
</body>
</html>
