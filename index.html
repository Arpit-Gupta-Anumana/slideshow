<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slideshow</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  #viewer {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #viewer img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: opacity 0.4s ease;
  }

  #viewer img.loading { opacity: 0; }

  #counter {
    position: absolute;
    top: 14px;
    right: 18px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    color: #888;
    background: rgba(0,0,0,0.5);
    padding: 4px 10px;
    border-radius: 6px;
  }

  #status {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 22px;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 12px 28px;
    border-radius: 10px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 10;
    max-width: 80%;
    text-align: center;
  }
  #status.show { opacity: 1; }

  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: none;
    color: #ccc;
    font-size: 28px;
    width: 48px;
    height: 72px;
    border-radius: 8px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 2;
  }
  #viewer:hover .nav-btn { opacity: 1; }
  .nav-btn:hover { background: rgba(255,255,255,0.15); }
  #prev-btn { left: 12px; }
  #next-btn { right: 12px; }

  #empty-state {
    text-align: center;
    color: #555;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    line-height: 2;
  }
  #empty-state span { font-size: 48px; display: block; margin-bottom: 8px; }
</style>
</head>
<body>

<div id="viewer">
  <div id="empty-state">
    <span>🖼</span>
    Loading images from server...
  </div>
  <img id="slide" style="display:none" />
  <div id="counter"></div>
  <div id="status"></div>
  <button class="nav-btn" id="prev-btn">‹</button>
  <button class="nav-btn" id="next-btn">›</button>
</div>

<script>
const IMAGE_DIR = '/images/';
const IMG_EXT = new Set(['jpg','jpeg','png','gif','webp','bmp','svg','avif','tiff']);

let images = [];
let current = 0;
let playing = true;
let finished = false;
let interval = 3;
let autoTimer = null;

const slideEl   = document.getElementById('slide');
const counterEl = document.getElementById('counter');
const statusEl  = document.getElementById('status');
const emptyState = document.getElementById('empty-state');

function numericStem(name) {
  const base = name.replace(/\.[^.]+$/i, '');
  const m = base.match(/^(\d+)/);
  return m ? parseInt(m[1], 10) : NaN;
}

function findStartIndex(n) {
  if (!Number.isFinite(n)) return 0;
  for (let i = 0; i < images.length; i++) {
    const v = numericStem(images[i]);
    if (Number.isFinite(v) && v >= n) return i;
  }
  return 0;
}

function flashStatus(msg, ms) {
  statusEl.textContent = msg;
  statusEl.classList.add('show');
  clearTimeout(statusEl._t);
  statusEl._t = setTimeout(() => statusEl.classList.remove('show'), ms || 800);
}

async function fetchImageList() {
  try {
    const res = await fetch(IMAGE_DIR);
    const listing = await res.json();
    return listing
      .filter(f => f.type === 'file' && IMG_EXT.has(f.name.split('.').pop().toLowerCase()))
      .map(f => f.name)
      .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
  } catch (e) {
    console.error('Failed to fetch image list:', e);
    emptyState.innerHTML = '<span>⚠️</span>Could not reach the image server.<br>Make sure nginx is running.';
    return [];
  }
}

async function fireAdbTrigger(filename) {
  try {
    const res = await fetch('/api/trigger', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: filename })
    });
    let data = {};
    try { data = await res.json(); } catch (_) {}
    if (!res.ok || data.ok === false) {
      return { ok: false, error: data.error || `HTTP ${res.status}`, dest: data.dest };
    }
    return { ok: true, queued: data.queued || false, dest: data.dest, src: data.src };
  } catch (e) {
    return { ok: false, error: String(e) };
  }
}

function clearAutoTimer() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
}

async function showImage(index) {
  if (images.length === 0) return true;
  current = Math.max(0, Math.min(images.length - 1, index));
  const img = slideEl;
  img.classList.add('loading');
  img.onload = () => img.classList.remove('loading');
  img.src = IMAGE_DIR + encodeURIComponent(images[current]);
  img.style.display = 'block';
  emptyState.style.display = 'none';
  counterEl.textContent = `${current + 1} / ${images.length}`;

  const cap = await fireAdbTrigger(images[current]);
  if (!cap.ok) {
    playing = false;
    clearAutoTimer();
    flashStatus(
      `Capture failed: ${cap.error}. Check USB/camera/storage. Press R to resume.`,
      10000
    );
    return false;
  }
  return true;
}

function endSlideshow() {
  if (finished || images.length === 0) return;
  finished = true;
  playing = false;
  clearAutoTimer();
  counterEl.textContent = `${images.length} / ${images.length} — done`;
  flashStatus('Slideshow finished — all images captured', 5000);
}

function scheduleAuto() {
  clearAutoTimer();
  if (!playing || finished || images.length <= 1) return;
  autoTimer = setTimeout(() => {
    autoTimer = null;
    void (async () => {
      if (!playing || finished) return;
      if (current >= images.length - 1) { endSlideshow(); return; }
      const ok = await showImage(current + 1);
      if (ok) scheduleAuto();
    })();
  }, interval * 1000);
}

async function goNext() {
  if (images.length === 0 || finished) return;
  clearAutoTimer();
  if (current >= images.length - 1) { endSlideshow(); return; }
  const ok = await showImage(current + 1);
  if (ok) scheduleAuto();
}

async function goPrev() {
  if (images.length === 0) return;
  if (finished) finished = false;
  clearAutoTimer();
  if (current <= 0) return;
  const ok = await showImage(current - 1);
  if (ok) scheduleAuto();
}

function pause() {
  if (!playing) return;
  playing = false;
  clearAutoTimer();
  flashStatus('⏸ Paused');
}

function resume() {
  if (playing || finished) return;
  playing = true;
  scheduleAuto();
  flashStatus('▶ Playing');
}

document.getElementById('prev-btn').addEventListener('click', () => void goPrev());
document.getElementById('next-btn').addEventListener('click', () => void goNext());

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); void goNext(); }
  if (e.key === 'ArrowLeft') { void goPrev(); }
  if (e.key === 'p' || e.key === 'P') pause();
  if (e.key === 'r' || e.key === 'R') resume();
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

document.getElementById('viewer').addEventListener('dblclick', toggleFullscreen);

(async () => {
  images = await fetchImageList();
  if (images.length > 0) {
    const raw = new URLSearchParams(location.search).get('start');
    const startNum = raw != null && raw !== '' ? parseInt(raw, 10) : NaN;
    const idx = findStartIndex(startNum);
    finished = false;
    const ok = await showImage(idx);
    if (Number.isFinite(startNum) && idx > 0) {
      flashStatus(`Resuming at ${images[idx]}`, 2000);
    }
    if (images.length === 1) {
      if (ok) setTimeout(() => endSlideshow(), interval * 1000);
    } else if (ok) {
      scheduleAuto();
    }
  } else {
    emptyState.innerHTML = '<span>🖼</span>No images found.<br>Put image files in the <b>images/</b> folder and restart nginx.';
  }
})();
</script>
</body>
</html>
